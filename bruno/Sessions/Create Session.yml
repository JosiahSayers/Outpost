info:
  name: Create Session
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/sign-in/email"
  headers:
    - name: Origin
      value: http://localhost:3000
  body:
    type: json
    data: |-
      {
        "email": "{{userEmail}}",
        "password": "{{userPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
