name: Playwright Tests
on:
  pull_request:
jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose stack
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx --bun prisma generate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run DB migrations
        run: |
          docker compose -f docker-compose.ci.yml exec -T app bunx --bun prisma generate
          docker compose -f docker-compose.ci.yml exec -T app bunx --bun prisma migrate deploy

      - name: Seed DB
        run: docker compose -f docker-compose.ci.yml exec -T app bun db:seed

      - name: Start app
        run: docker compose -f docker-compose.ci.yml exec -T -d app bun dev

      - name: Run Playwright tests
        run: bun test:e2e
        env:
          BASE_URL: http://localhost:3000
          # Playwright runs on the host runner, not inside the app container,
          # so it needs its own DB connection string. The db service's port
          # is published to the host by docker-compose.dev.yml.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/outpost

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.ci.yml down
