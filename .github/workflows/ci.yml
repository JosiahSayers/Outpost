name: CI
on:
  pull_request:
jobs:
  run_checks:
    name: Run Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [test, format:check]
    services:
      db:
        image: postgres
        env:
          POSTGRES_DB: outpost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/outpost
      REDIS_URL: valkey://localhost:6379
      PORT: 3000
      SKIP_LOG_WRITE: "true"
      BETTER_AUTH_SECRET: really-bad-secret
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: not-a-real-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate prisma client
        run: bunx --bun prisma generate
      - name: Run ${{ matrix.suite }}
        run: bun ${{ matrix.suite }}
